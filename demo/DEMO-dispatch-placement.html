<html lang="fr">
<head>
<!-- Version de DÉMONSTRATION — données fictives — code minifié. Tous droits réservés. -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>[DÉMO] Dispatch Placement</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#17202B; --bg:#EDF0F3; --panel:#FFFFFF; --line:#D9DFE6; --muted:#5C6874;
    --urgent:#C92A2A; --warn:#E8590C; --ok:#2B8A3E; --action:#2B59C3; --action-d:#1E4396;
    --gold:#B08900;
  }
  *{box-sizing:border-box; margin:0}
  html,body{height:100%}
  body{font:15px/1.45 'Barlow',sans-serif; color:var(--ink); background:var(--bg)}
  h1,h2,h3,.data{font-family:'Barlow Semi Condensed',sans-serif}
  header{display:flex; align-items:center; gap:20px; padding:0 18px; height:54px;
    background:var(--ink); color:#fff; position:sticky; top:0; z-index:1200}
  header .brand{font-family:'Barlow Semi Condensed'; font-weight:700; font-size:18px; letter-spacing:.4px}
  header .brand span{color:#7EA4FF}
  nav{display:flex; gap:4px; margin-left:8px}
  nav button{font:600 14px 'Barlow Semi Condensed'; letter-spacing:.3px; color:#B9C2CE;
    background:none; border:none; padding:8px 14px; border-radius:8px; cursor:pointer}
  nav button:hover{color:#fff}
  nav button.on{background:#2A3644; color:#fff}
  .demo-badge{margin-left:auto; font:600 12px 'Barlow Semi Condensed'; letter-spacing:.6px;
    color:#FFD43B; border:1px solid #FFD43B66; padding:3px 10px; border-radius:99px}
  main{display:grid; grid-template-columns:1fr 460px; height:calc(100% - 54px)}
  #map{height:100%; z-index:1}
  aside{background:var(--panel); border-left:1px solid var(--line); overflow-y:auto; padding:16px}
  .page{display:none; height:calc(100% - 54px); overflow-y:auto; padding:24px}
  .page.on{display:block}
  main.hidden{display:none}
  @media(max-width:900px){
    main{grid-template-columns:1fr; grid-template-rows:44vh 1fr}
    aside{border-left:none; border-top:1px solid var(--line)}
  }
  .kicker{font:600 11px 'Barlow Semi Condensed'; letter-spacing:1.2px; text-transform:uppercase; color:var(--muted)}
  .card{border:1px solid var(--line); border-radius:12px; padding:14px; margin-top:12px; background:#fff}
  .card.click{cursor:pointer; transition:border-color .12s, box-shadow .12s}
  .card.click:hover{border-color:var(--action); box-shadow:0 2px 10px #2B59C31A}
  .row{display:flex; align-items:center; gap:8px; flex-wrap:wrap}
  .sp{margin-left:auto}
  .muted{color:var(--muted); font-size:13px}
  .tel{font-family:'Barlow Semi Condensed'; font-weight:600; letter-spacing:.5px}
  a.tel{color:var(--action); text-decoration:none}
  .chip{font:700 12px 'Barlow Semi Condensed'; letter-spacing:.4px; padding:2px 9px; border-radius:99px; white-space:nowrap}
  .chip.urgent{background:#C92A2A14; color:var(--urgent); border:1px solid #C92A2A55}
  .chip.warn{background:#E8590C14; color:var(--warn); border:1px solid #E8590C55}
  .chip.ok{background:#2B8A3E12; color:var(--ok); border:1px solid #2B8A3E44}
  .chip.gray{background:#5C687414; color:var(--muted); border:1px solid #5C687433}
  .note{font:700 12px 'Barlow Semi Condensed'; padding:2px 9px; border-radius:6px}
  .note.fusee{background:#FFF3BF; color:var(--gold); border:1px solid #B0890055}
  .note.bon{background:#D3F9D8; color:var(--ok)}
  .note.placable{background:#D0EBFF; color:#1971C2}
  .note.potentiel{background:#FFE8CC; color:var(--warn)}
  .note.cave{background:#E9ECEF; color:var(--muted)}
  .slot{display:flex; align-items:center; gap:10px; padding:10px 12px; border:1px solid var(--line);
    border-radius:10px; margin-top:8px; background:#FAFBFC}
  .slot .when{font:700 15px 'Barlow Semi Condensed'; letter-spacing:.5px; min-width:130px}
  .slot.used{opacity:.6}
  .slot button{margin-left:auto}
  .lb{display:inline-flex; align-items:center; justify-content:center; min-width:26px; height:22px;
    padding:0 5px; border-radius:5px; font:700 13px 'Barlow Semi Condensed'; color:#fff}
  .lb.walk{background:none; color:var(--muted); font-size:15px; min-width:auto}
  .itin{margin-top:10px; padding:10px 12px; background:#F4F6F8; border-radius:10px; font-size:13px}
  .itin .leg{display:flex; gap:8px; align-items:baseline; padding:3px 0}
  .itin .leg .t{font:700 13px 'Barlow Semi Condensed'; min-width:42px; color:var(--ink)}
  .itin .total{font:700 14px 'Barlow Semi Condensed'; margin-bottom:6px}
  button.act{font:600 14px 'Barlow'; background:var(--action); color:#fff; border:none;
    padding:8px 14px; border-radius:9px; cursor:pointer}
  button.act:hover{background:var(--action-d)}
  button.act:disabled{background:#A9B4C0; cursor:default}
  button.ghost{font:600 13px 'Barlow'; background:none; color:var(--action); border:1px solid var(--line);
    padding:6px 12px; border-radius:9px; cursor:pointer}
  button.ghost:hover{border-color:var(--action)}
  .back{font:600 13px 'Barlow'; color:var(--muted); background:none; border:none; cursor:pointer; padding:0 0 10px}
  .back:hover{color:var(--ink)}
  .fbtn{font:600 12px 'Barlow Semi Condensed'; letter-spacing:.3px; padding:4px 11px; border-radius:99px;
    border:1px solid var(--line); background:#fff; color:var(--muted); cursor:pointer}
  .fbtn:hover{border-color:var(--action); color:var(--action)}
  .fbtn.on{background:var(--action); border-color:var(--action); color:#fff}
  .flbl{font:600 11px 'Barlow Semi Condensed'; letter-spacing:.8px; text-transform:uppercase;
    color:var(--muted); min-width:58px}
  .score{font:700 20px 'Barlow Semi Condensed'; color:var(--action)}
  .score small{font-size:12px; color:var(--muted); font-weight:600}
  .bar{height:5px; border-radius:99px; background:#E4E8EC; overflow:hidden; margin-top:4px}
  .bar i{display:block; height:100%; background:var(--action)}
  table{width:100%; border-collapse:collapse; margin-top:14px; background:#fff; border-radius:12px; overflow:hidden}
  th,td{text-align:left; padding:10px 12px; border-bottom:1px solid var(--line); font-size:14px}
  th{font:600 12px 'Barlow Semi Condensed'; letter-spacing:.8px; text-transform:uppercase; color:var(--muted); background:#F7F8FA}
  .mk{color:#fff; font:700 13px 'Barlow Semi Condensed'; width:30px; height:30px; border-radius:99px;
    display:flex; align-items:center; justify-content:center; border:2.5px solid #fff; box-shadow:0 2px 8px #0004}
  .mk.pulse{animation:pulse 1.6s ease-out infinite}
  @keyframes pulse{
    0%{box-shadow:0 2px 8px #0004, 0 0 0 0 rgba(201,42,42,.55)}
    70%{box-shadow:0 2px 8px #0004, 0 0 0 16px rgba(201,42,42,0)}
    100%{box-shadow:0 2px 8px #0004, 0 0 0 0 rgba(201,42,42,0)}
  }
  @media (prefers-reduced-motion:reduce){.mk.pulse{animation:none; outline:3px solid var(--urgent); outline-offset:2px}}
  .sexe{display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px;
    border-radius:99px; font:700 12px 'Barlow Semi Condensed'}
  .sexe.F{background:#F3D9FA; color:#9C36B5}
  .sexe.H{background:#D0EBFF; color:#1971C2}
  button.danger{font:600 13px 'Barlow'; background:none; color:var(--urgent); border:1px solid #C92A2A55;
    padding:6px 12px; border-radius:9px; cursor:pointer}
  button.danger:hover{background:#C92A2A10}
  .card.off{opacity:.55; background:#F4F6F8}
  .slot.past{background:#F1F3F5; opacity:.6}
  .slot.past .when{text-decoration:line-through; color:var(--muted)}
  .chip.nonpourvu{background:#E9ECEF; color:var(--muted); border:1px dashed #5C687488; letter-spacing:.8px}
  .stsel{font:600 12px 'Barlow Semi Condensed'; padding:3px 7px; border:1px solid var(--line);
    border-radius:7px; background:#fff; color:var(--ink); cursor:pointer; max-width:150px}
  .stsel:hover{border-color:var(--action)}
  .chip.bl{background:#111; color:#fff; border:1px solid #000; border-radius:4px; letter-spacing:.5px}
  .navbadge{background:var(--urgent); color:#fff; border-radius:99px; padding:0 7px;
    font-size:11px; margin-left:5px; display:inline-block; line-height:17px}
  .card.off h3{text-decoration:line-through; color:var(--muted)}
  .veil{position:fixed; inset:0; background:#17202B77; z-index:3000; display:none;
    align-items:center; justify-content:center}
  .veil.on{display:flex}
  .modal{background:#fff; border-radius:14px; padding:20px; max-width:440px; width:92%;
    box-shadow:0 10px 40px #0005}
  .modal p{white-space:pre-line; margin:8px 0 16px}
  .toast{position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--ink);
    color:#fff; padding:10px 18px; border-radius:10px; font:600 14px 'Barlow'; z-index:2000;
    opacity:0; transition:opacity .25s; pointer-events:none}
  .toast.on{opacity:1}
  .legend{position:absolute; bottom:14px; left:14px; z-index:1000; background:#fff; border:1px solid var(--line);
    border-radius:10px; padding:8px 12px; font-size:12px; display:flex; gap:12px}
  .dot{width:10px;height:10px;border-radius:99px;display:inline-block;margin-right:4px;vertical-align:-1px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>

 du CV de "+n.prenom+"…");const t=await Api.analyser(n);DB.analyses[e]=t.analyse,toast(t.depuisCache?"Résultat récupéré depuis le cache ✓":"Analyse terminée et mise en cache ✓"),renderAnalyses()}function afficherErreurBoot(e,n){const t=`\n    <div class="card" style="border-color:var(--urgent)">\n      <h3 style="color:var(--urgent)">⚠ L'application n'a pas pu démarrer</h3>\n      <div class="muted" style="margin-top:6px">Étape en échec : <b>${e}</b></div>\n      <div style="margin-top:8px; font-family:monospace; font-size:13px; white-space:pre-wrap; background:#F4F6F8; padding:10px 12px; border-radius:8px">${String(n&&n.message?n.message:n).split("<").join("&lt;")||"(aucun message — voir la console du navigateur : F12 → Console)"}</div>\n      <div class="muted" style="margin-top:10px">Pistes, dans l'ordre :<br>\n        1. Dans l'éditeur Apps Script, vérifier qu'il n'existe qu'<b>UNE seule copie</b> du code serveur (un ancien fichier .gs conservé à côté du nouveau provoque « Identifier 'CFG' has already been declared » et fait échouer TOUS les appels).<br>\n        2. Lancer <b>testChargementDonnees</b> depuis l'éditeur (▶ Exécuter) et lire le journal : il rejoue le chargement section par section et pointe la lecture qui casse.<br>\n        3. Re-déployer : Déployer → Gérer les déploiements → ✏️ → Version « Nouvelle version » → Déployer (modifier le code ne suffit pas, il faut une nouvelle version).</div>\n      <div class="row" style="margin-top:10px"><button class="act" onclick="location.reload()">↻ Recharger</button></div>\n    </div>`,s=$("#panel");s?s.innerHTML=t:document.body.innerHTML=t}!async function(){EN_PROD||($("#demoBadge").hidden=!1);let e="chargement des données serveur (api_getData)";try{DB=await Api.getData(),e="initialisation de la carte (Leaflet)",initMap(),e="affichage de la liste des entreprises",renderListe(),e="contrôle qualité des données",majBadgeDonnees()}catch(n){afficherErreurBoot(e,n)}}();</script>
</body>
